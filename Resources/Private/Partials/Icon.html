<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:xtps="http://typo3.org/ns/Xima/XimaTypo3PageSubscription/ViewHelpers" data-namespace-typo3-fluid="true">

<f:if condition="!{width} && !{height}">
    <f:variable name="width" value="20"/>
    <f:variable name="height" value="20"/>
</f:if>

<f:format.raw>
    <xtps:icon icon="{icon}" src="{src}" table="{table}" ctype="{ctype}" width="{width}" height="{height}"/>
</f:format.raw>
