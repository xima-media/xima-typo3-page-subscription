<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<a href="{baseUrl}">
    <f:if condition="{logo}">
        <f:then>
            <f:render partial="Icon" arguments="{src: logo, width: 300}"/>
        </f:then>
        <f:else>
            <div style="opacity: 0.5">
                <f:render partial="Icon" arguments="{icon: 'actions-eye'}"/>
            </div>
        </f:else>
        <f:render partial="Icon" arguments="{src: logo}"/>
    </f:if>
</a>
